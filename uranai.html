<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神託 ── おみくじ占い</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;500;700&family=Yuji+Syuku&display=swap" rel="stylesheet">
<style>
  :root{
    --ground-top:#1f2a47;
    --ground-bottom:#121829;
    --ink:#23201c;
    --paper:#f1e9d7;
    --paper-edge:#e2d6bb;
    --shu:#c63f2c;
    --shu-deep:#a8301f;
    --gold:#b8995a;
    --muted:#8b93a8;
    --display:"Yuji Syuku","Shippori Mincho B1",serif;
    --serif:"Shippori Mincho B1",serif;
  }

  *{box-sizing:border-box;margin:0;padding:0;}

  body{
    min-height:100dvh;
    display:grid;
    place-items:center;
    padding:32px 20px;
    background:
      radial-gradient(140% 90% at 50% 0%, #2a3a5e 0%, var(--ground-top) 38%, var(--ground-bottom) 100%);
    color:var(--paper);
    font-family:var(--serif);
    -webkit-font-smoothing:antialiased;
  }

  .oracle{
    width:100%;
    max-width:420px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  /* eyebrow / label */
  .oracle__eyebrow{
    display:flex;
    align-items:center;
    gap:12px;
    font-size:.72rem;
    letter-spacing:.42em;
    text-indent:.42em;
    color:var(--muted);
    text-transform:uppercase;
  }
  .oracle__eyebrow::before,
  .oracle__eyebrow::after{
    content:"";
    width:28px;
    height:1px;
    background:linear-gradient(90deg,transparent,var(--gold));
  }
  .oracle__eyebrow::after{transform:scaleX(-1);}

  .oracle__title{
    margin:14px 0 4px;
    font-family:var(--display);
    font-size:2.6rem;
    font-weight:400;
    letter-spacing:.18em;
    text-indent:.18em;
  }
  .oracle__lead{
    color:var(--muted);
    font-size:.9rem;
    letter-spacing:.08em;
    margin-bottom:34px;
  }

  /* 神託の札 ── the slip (signature element) */
  .slip{
    position:relative;
    width:148px;
    min-height:300px;
    padding:30px 0 26px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    background:linear-gradient(180deg,var(--paper),var(--paper-edge));
    border:1px solid rgba(184,153,90,.5);
    border-radius:3px;
    box-shadow:
      0 1px 0 rgba(255,255,255,.4) inset,
      0 22px 40px -18px rgba(0,0,0,.7);
    transform-origin:top center;
  }
  /* thin inner gold rule, hairline frame on the paper */
  .slip::before{
    content:"";
    position:absolute;
    inset:8px;
    border:1px solid rgba(168,48,31,.28);
    border-radius:2px;
    pointer-events:none;
  }

  .slip__text{
    writing-mode:vertical-rl;
    font-family:var(--display);
    font-size:1.9rem;
    line-height:1.32;
    letter-spacing:.14em;
    color:var(--ink);
    min-height:200px;
    display:flex;
    align-items:center;
  }

  /* 朱印 ── the seal */
  .seal{
    margin-top:auto;
    width:50px;
    height:50px;
    display:grid;
    place-items:center;
    border:2.5px solid var(--shu);
    border-radius:8px;
    color:var(--shu);
    font-family:var(--display);
    font-size:1.5rem;
    line-height:1;
    opacity:.92;
    box-shadow:0 0 0 3px rgba(198,63,44,.12);
  }

  /* placeholder state before drawing */
  .slip[data-state="idle"] .slip__text{
    color:var(--muted);
    font-size:1.15rem;
    letter-spacing:.5em;
  }
  .slip[data-state="idle"] .seal{visibility:hidden;}

  /* reveal animation */
  .slip[data-state="revealed"]{animation:unfurl .55s cubic-bezier(.2,.8,.25,1) both;}
  .slip[data-state="revealed"] .slip__text{animation:fadeUp .6s ease .12s both;}
  .slip[data-state="revealed"] .seal{animation:stamp .4s cubic-bezier(.34,1.56,.64,1) .34s both;}

  @keyframes unfurl{
    from{transform:scaleY(.04);opacity:0;}
    60%{opacity:1;}
    to{transform:scaleY(1);opacity:1;}
  }
  @keyframes fadeUp{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
  }
  @keyframes stamp{
    from{opacity:0;transform:scale(1.7) rotate(-12deg);}
    to{opacity:.92;transform:scale(1) rotate(-4deg);}
  }

  /* action */
  .draw{
    margin-top:38px;
    padding:14px 40px;
    font-family:var(--serif);
    font-size:1.05rem;
    font-weight:700;
    letter-spacing:.28em;
    text-indent:.28em;
    color:var(--paper);
    background:linear-gradient(180deg,var(--shu),var(--shu-deep));
    border:none;
    border-radius:999px;
    cursor:pointer;
    box-shadow:0 10px 24px -10px rgba(198,63,44,.8);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .draw:hover{transform:translateY(-2px);box-shadow:0 14px 28px -10px rgba(198,63,44,.85);}
  .draw:active{transform:translateY(0);}
  .draw:focus-visible{outline:2px solid var(--gold);outline-offset:3px;}

  @media (prefers-reduced-motion:reduce){
    .slip[data-state="revealed"],
    .slip[data-state="revealed"] .slip__text,
    .slip[data-state="revealed"] .seal{animation:none;}
    .draw{transition:none;}
  }
</style>
</head>
<body>
  <main class="oracle">
    <p class="oracle__eyebrow">Oracle</p>
    <h1 class="oracle__title">神託</h1>
    <p class="oracle__lead">迷いに、ひとつの言葉を。</p>

    <div class="slip" id="slip" data-state="idle">
      <p class="slip__text" id="slipText">占ってください</p>
      <div class="seal" aria-hidden="true">神</div>
    </div>

    <button class="draw" id="drawBtn">占　う</button>
  </main>

<script>
  const RESULTS = [
    "知識を蓄えるべし",
    "直感を信じるべし",
    "人を見つけるべし",
    "行ってよし",
    "待つべし",
    "見たほうが良い",
    "考えるべし",
    "質問すべし",
    "行動すべし",
    "過去を振り返るべし",
    "未来を考えるべし"
  ];

  const slip = document.getElementById("slip");
  const slipText = document.getElementById("slipText");
  const drawBtn = document.getElementById("drawBtn");

  // 直前に出た結果を保持し、2回連続で同じ結果が出ないようにする
  let lastIndex = -1;

  function pickIndex(){
    let i;
    do {
      i = Math.floor(Math.random() * RESULTS.length);
    } while (i === lastIndex && RESULTS.length > 1);
    lastIndex = i;
    return i;
  }

  function draw(){
    const result = RESULTS[pickIndex()];
    slipText.textContent = result;

    // re-trigger the reveal animation even on repeated draws
    slip.setAttribute("data-state", "idle");
    void slip.offsetWidth; // force reflow
    slip.setAttribute("data-state", "revealed");

    drawBtn.textContent = "もう一度占う";
  }

  drawBtn.addEventListener("click", draw);
</script>
</body>
</html>
